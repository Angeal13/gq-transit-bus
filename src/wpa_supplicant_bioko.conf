ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1
country=GQ

# BIOKO_BUS is a hidden SSID (broadcast disabled for security).
# scan_ssid=1 forces the Pi to actively probe for it.
# The Pi will ONLY connect to this network — no other networks.
network={
    ssid="BIOKO_BUS"
    scan_ssid=1
    psk="CHANGE_TO_YOUR_WIFI_PASSWORD"
    key_mgmt=WPA-PSK

    # Roaming: background scan every 30s, more aggressively if signal < -70 dBm
    bgscan="simple:30:-70:300"

    # Priority 10 ensures this network is always preferred if available
    priority=10
}
