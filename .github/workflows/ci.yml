name: Bus node — lint and test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8
          # Install non-hardware deps only (GPIO/spidev not available on CI)
          pip install requests pytz gTTS pyttsx3 pygame

      - name: Lint
        run: |
          flake8 src/ --max-line-length=120 \
            --exclude=src/venv \
            --ignore=E501,W503

      - name: Import check (non-hardware modules)
        run: |
          cd src
          python -c "from data_models import BusRoute, StopInfo, Bus; print('data_models OK')"
          python -c "from config import SERVER_CONFIG, REGION_NAME; print('config OK')"
          python -c "import server_client; print('server_client OK')"
